<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>🚽 Współkłojownictwo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f172a;
      color:white;
      font-family:'Fredoka',sans-serif;
      padding:16px;
      padding-bottom:120px;
    }

    h1{
      text-align:center;
      font-size:2rem;
      margin-bottom:8px;
    }

    .subtitle{
      text-align:center;
      opacity:0.8;
      margin-bottom:24px;
    }

    .player-card{
      background:#1e293b;
      border-radius:24px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.35);
      transition:0.15s;
    }

    .player-card:active{
      transform:scale(0.98);
    }

    .player-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      font-size:1.2rem;
      font-weight:bold;
    }

    .score{
      font-size:1.2rem;
    }

    .progress{
      width:100%;
      height:16px;
      background:#334155;
      border-radius:999px;
      overflow:hidden;
      margin-bottom:16px;
    }

    .progress-bar{
      height:100%;
      background:linear-gradient(90deg,#22c55e,#84cc16);
      transition:0.3s;
    }

    button{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      background:#22c55e;
      color:black;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
    }

    button:active{
      transform:scale(0.96);
    }

    .message{
      position:fixed;
      bottom:24px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      color:black;
      padding:12px 20px;
      border-radius:999px;
      font-weight:bold;
      opacity:0;
      transition:0.3s;
      pointer-events:none;
      z-index:999;
    }

    .message.show{
      opacity:1;
    }

  </style>
</head>

<body>

  <h1>🚽 WSPÓŁKŁOJOWNICTWO</h1>

  <div class="subtitle">
    Bitwa o porcelanowy tron
  </div>

  <div id="players"></div>

  <div class="message" id="message"></div>

  <script>

const SHEET_URL =
  "https://opensheet.elk.sh/1ABCDEF123456789/Arkusz1";

    const messages = [
      "💀 Kolejna porcelanka",
      "🚽 Speedrun completed",
      "📈 Forma rośnie",
      "🔥 Combo x3",
      "☢️ Kryzys żołądkowy",
      "🧻 Potężne wyjście",
      "💩 Grubo poszło",
      "🚨 Alarm łazienkowy"
    ];

    async function loadPlayers(){

      const response = await fetch(SHEET_URL);

      const data = await response.json();

      const playersDiv =
        document.getElementById("players");

      playersDiv.innerHTML = "";

      data.sort(
        (a,b)=>
        Number(b.points)-Number(a.points)
      );

      const maxPoints = Math.max(
        ...data.map(
          p=>Number(p.points)
        ),
        1
      );

      data.forEach((player,index)=>{

        const points =
          Number(player.points);

        const progressWidth =
          (points/maxPoints)*100;

        let medal = `${index+1}.`;

        if(index===0) medal="🥇";
        if(index===1) medal="🥈";
        if(index===2) medal="🥉";

        const card =
          document.createElement("div");

        card.className="player-card";

        card.innerHTML = `
          <div class="player-header">
            <span>
              ${medal} ${player.name}
            </span>

            <span class="score">
              ${points} 🚽
            </span>
          </div>

          <div class="progress">
            <div
              class="progress-bar"
              style="width:${progressWidth}%">
            </div>
          </div>

          <button
            onclick="registerPoop('${player.name}')">

            🔥 ZAREJESTRUJ KUPĘ 🔥

          </button>
        `;

        playersDiv.appendChild(card);

      });

    }

    function registerPoop(name){

      showMessage();

      alert(
        `Dodano +1 dla ${name} 🚽\n\n` +
        `Zmień wynik w Google Sheets.`
      );

    }

    function showMessage(){

      const message =
        document.getElementById("message");

      const randomMessage =
        messages[
          Math.floor(
            Math.random()*messages.length
          )
        ];

      message.innerText =
        randomMessage;

      message.classList.add("show");

      setTimeout(()=>{
        message.classList.remove("show");
      },2000);

    }

    loadPlayers();

  </script>

</body>
</html>
